name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages to npm
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Validate and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Check lockfile sync
        run: node scripts/check-lockfile-sync.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @glypher/playground exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Dry-run npm publish
        run: pnpm release:dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ inputs.publish }}
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
